
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Aminna" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Gestão Inteligente - Esmalteria SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Detecção de "Site para Computador" no Mobile
      (function() {
        function updateViewport() {
          const ua = navigator.userAgent;
          const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
          const viewport = document.getElementById('viewport');
          
          // Se o UA não for mobile (indicando que a flag "Site para Computador" está ativa)
          // ou se for uma tela muito larga (como o Fold aberto em modo tablet), forçamos o modo desktop
          if (!isMobileUA || window.innerWidth > 900) {
            if (viewport) {
              // 1024px é o padrão industrial para "Desktop Mode" que garante o acionamento 
              // dos breakpoints 'lg' sem ser excessivamente largo para telas verticais.
              viewport.setAttribute('content', 'width=1024');
            }
            document.documentElement.classList.add('force-desktop');
          } else {
            if (viewport) {
              viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover');
            }
            document.documentElement.classList.remove('force-desktop');
          }
        }

        updateViewport();
        // Detectar mudanças de orientação e redimensionamento para ajustar o zoom
        window.addEventListener('resize', updateViewport);
        window.addEventListener('orientationchange', () => {
          setTimeout(updateViewport, 200);
        });
      })();

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              indigo: {
                50: '#f4f4f5',
                100: '#e4e4e7',
                200: '#d4d4d8',
                300: '#a1a1aa',
                400: '#71717a',
                500: '#52525b',
                600: '#27272a',
                700: '#18181b',
                800: '#09090b',
                900: '#09090b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            screens: {
              'xs': '390px',
              'fold': '600px',
              'sm': '640px',
              'md': '768px',
              'lg': '1024px',
              'xl': '1280px',
              '2xl': '1536px',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Biblioteca para geração de PDF no cliente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ===== Samsung Galaxy Fold / Foldable Support ===== */
      /* No modo desktop forçado, usamos larguras flexíveis para evitar cortes */
      .force-desktop body { min-width: 1024px; overflow-x: auto; }
      .force-desktop #root { min-width: 1024px; width: 100%; }

      html, body, #root { max-width: 100vw; }
      .force-desktop html, .force-desktop body { max-width: none; }

      /* Safe area padding for fold hinge and notch */
      @supports (padding: env(safe-area-inset-left)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }

      /* Force Desktop Mode Overrides */
      .force-desktop .hidden.sm\:flex,
      .force-desktop .hidden.md\:flex, 
      .force-desktop .hidden.lg\:flex { display: flex !important; }
      
      .force-desktop .hidden.sm\:block,
      .force-desktop .hidden.md\:block,
      .force-desktop .hidden.lg\:block { display: block !important; }

      .force-desktop .sm\:hidden,
      .force-desktop .md\:hidden,
      .force-desktop .lg\:hidden { display: none !important; }

      /* Aspect Ratio Optimization - Square screens (Fold open) */
      @media (min-aspect-ratio: 1/1) and (max-aspect-ratio: 1.1/1) and (max-width: 1100px) {
        .force-desktop .grid-cols-5,
        .grid-cols-5 {
          grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
        }
        .force-desktop .grid-cols-4,
        .grid-cols-4 {
          grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        }
      }

      /* On narrow foldable screens (cover display ~400px): show mobile layout */
      @media (max-width: 599px) {
        .fold-force-mobile { display: block !important; }
        .fold-hide-mobile { display: none !important; }
      }

      /* On inner fold screen (~600-900px): slightly larger touch targets */
      @media (min-width: 600px) and (max-width: 899px) {
        button, [role="button"] { min-height: 40px; }
        input, select, textarea { min-height: 38px; }
      }
      /* ===== End Fold Support ===== */
    </style>

  <body class="antialiased text-slate-900 bg-slate-50 dark:bg-zinc-950 dark:text-slate-100 transition-colors duration-300">
    <style>
      #initial-loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        transition: background-color 0.3s;
      }
      @media (prefers-color-scheme: dark) {
        #initial-loading {
          background-color: #09090b;
        }
        #initial-loading img {
          filter: invert(1);
        }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .4; transform: scale(0.96); }
      }
      .animate-pulse-slow {
        animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        height: 96px;
        width: auto;
        object-fit: contain;
      }
    </style>
    <div id="root">
      <div id="initial-loading">
        <img src="/logo.png" alt="Aminna" class="animate-pulse-slow" />
      </div>
    </div>
