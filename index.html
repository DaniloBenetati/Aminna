
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#6366f1" />
    <title>Gestão Inteligente - Esmalteria SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Detecção de "Site para Computador" no Mobile
      (function() {
        function updateViewport() {
          const ua = navigator.userAgent;
          const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
          const viewport = document.getElementById('viewport');
          
          // Se o UA não for mobile (indicando que a flag "Site para Computador" está ativa)
          // ou se for uma tela muito larga (como o Fold aberto em modo tablet), forçamos o modo desktop
          if (!isMobileUA || window.innerWidth > 1024) {
            if (viewport) {
              // Forçar uma largura de 1024px (padrão desktop seguro) para zoom-out automático
              viewport.setAttribute('content', 'width=1024, initial-scale=0.1, maximum-scale=5.0, user-scalable=yes');
            }
            document.documentElement.classList.add('force-desktop');
          } else {
            if (viewport) {
              viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover');
            }
            document.documentElement.classList.remove('force-desktop');
          }
        }

        updateViewport();
        // Opcional: Re-checar se a orientação mudar significativamente
        window.addEventListener('resize', () => {
          if (Math.abs(window.innerWidth - (window.lastWidth || 0)) > 100) {
            window.lastWidth = window.innerWidth;
            updateViewport();
          }
        });
      })();

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            screens: {
              'xs': '390px',
              'fold': '600px',
              'sm': '640px',
              'md': '768px',
              'lg': '1024px',
              'xl': '1280px',
              '2xl': '1536px',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Biblioteca para geração de PDF no cliente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ===== Samsung Galaxy Fold / Foldable Support ===== */
      /* No modo desktop forçado, removemos restrições de largura para evitar cortes laterais */
      .force-desktop body { min-width: 1024px; width: 100%; overflow-x: auto; }
      .force-desktop #root { width: 100%; min-width: 1024px; margin: 0; }

      html, body, #root { max-width: 100vw; overflow-x: hidden; }
      
      /* No modo desktop, o overflow deve ser visível para permitir zoom-out do navegador */
      .force-desktop html, .force-desktop body { max-width: none; overflow-x: auto; }

      /* Safe area padding for fold hinge and notch */
      @supports (padding: env(safe-area-inset-left)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }

      /* Force Desktop Mode Overrides */
      .force-desktop .hidden.sm\:flex,
      .force-desktop .hidden.md\:flex, 
      .force-desktop .hidden.lg\:flex { display: flex !important; }
      
      .force-desktop .hidden.sm\:block,
      .force-desktop .hidden.md\:block,
      .force-desktop .hidden.lg\:block { display: block !important; }

      .force-desktop .sm\:hidden,
      .force-desktop .md\:hidden,
      .force-desktop .lg\:hidden { display: none !important; }

      /* Ajuste fino para o Fold aberto (aspect ratio quase quadrado) */
      @media (min-aspect-ratio: 1/1) and (max-aspect-ratio: 1.1/1) {
        .force-desktop .grid-cols-5 { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }
        .force-desktop .grid-cols-4 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
      }

      /* On narrow foldable screens (cover display ~400px): show mobile layout */
      @media (max-width: 599px) {
        .fold-force-mobile { display: block !important; }
        .fold-hide-mobile { display: none !important; }
      }

      /* On inner fold screen (~600-900px): slightly larger touch targets */
      @media (min-width: 600px) and (max-width: 899px) {
        button, [role="button"] { min-height: 40px; }
        input, select, textarea { min-height: 38px; }
      }
      /* ===== End Fold Support ===== */
    </style>
